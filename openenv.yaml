id: govai
entrypoint: env.gov_env:GovEnv
tasks:
  - id: complaint_task
    grader: graders.complaint_grader:grade_complaint
  - id: policy_task
    grader: graders.policy_grader:grade_policy
  - id: budget_task
    grader: graders.budget_grader:grade_budget
name: GovtAI Ops
description: >
  Real-world government operations environment where an agent allocates public-sector tasks
  across employees, reduces delays, balances workload, and responds to dynamic incoming work.
environment:
  id: govtai-ops-v1
  type: discrete-control
observation_space:
  type: object
  fields:
    pending_tasks:
      type: integer
      description: Number of unfinished tasks still pending or in progress.
    delayed_tasks:
      type: integer
      description: Number of tasks that missed their deadline.
    high_priority_tasks:
      type: integer
      description: Number of unfinished high-priority tasks.
    avg_workload:
      type: number
      description: Average active workload across employees.
    idle_employees:
      type: integer
      description: Number of employees with no assigned work.
action_space:
  type: discrete
  size: 4
  actions:
    0: assign_best
    1: assign_least_busy
    2: reassign
    3: prioritize_urgent
reward:
  description: >
    Continuous reward shaping: +10 task completion, +5 early completion, +1 progress,
    -5 idle employee, -10 delay, -20 repeated bad decisions or loops.
evaluation:
  metrics:
    - completion_rate
    - delay_ratio
    - workload_balance
    - total_reward
api:
  reset: POST /reset
  step: POST /step
  state: GET /state
